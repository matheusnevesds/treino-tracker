<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Treino — Matheus</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root {
  --bg:#0a0c10; --surface:#13161e; --surface2:#1a1e2a; --border:#252b3b;
  --cyan:#00d4ff; --cyan-dim:rgba(0,212,255,0.12);
  --green:#00e676; --green-dim:rgba(0,230,118,0.1);
  --orange:#ff9100; --orange-dim:rgba(255,145,0,0.1);
  --purple:#bb86fc; --purple-dim:rgba(187,134,252,0.1);
  --red:#ff4444; --red-dim:rgba(255,68,68,0.1);
  --gold:#ffd700; --white:#f0f4ff; --gray:#8892a4; --gray2:#3a4255;
  --radius:12px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}

/* HEADER */
.app-header{position:sticky;top:0;z-index:100;background:rgba(10,12,16,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:calc(var(--safe-top) + 12px) 20px 12px}
.header-inner{display:flex;align-items:center;justify-content:space-between}
.app-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--cyan)}
.sync-btn{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--gray);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.sync-btn:active{transform:scale(.9);background:var(--cyan-dim);color:var(--cyan)}
.sync-btn.syncing{animation:spin .8s linear infinite;color:var(--cyan)}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(13,15,20,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:8px 0 calc(var(--safe-bot) + 8px);display:flex}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 0;transition:all .2s}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:10px;font-weight:600;letter-spacing:.5px;color:var(--gray)}
.nav-item.active .nav-label{color:var(--cyan)}
.nav-item.active .nav-icon{filter:drop-shadow(0 0 6px var(--cyan))}

/* PAGES */
.page{display:none;padding:16px 16px calc(90px + var(--safe-bot));animation:fadeUp .25s ease}
.page.active{display:block}

/* SECTION LABEL */
.section-label{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--gray);text-transform:uppercase;margin-bottom:10px;padding-left:2px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* DAY SELECTOR */
.day-selector{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:16px}
.day-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:8px 2px;cursor:pointer;text-align:center;transition:all .2s}
.day-btn .day-abbr{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:1px;color:var(--gray);display:block}
.day-btn .day-name{font-size:8px;font-weight:600;color:var(--gray2);display:block;margin-top:2px}
.day-btn.active{background:var(--cyan-dim);border-color:var(--cyan)}
.day-btn.active .day-abbr{color:var(--cyan)}
.day-btn.active .day-name{color:var(--cyan);opacity:.7}
.day-btn.has-run{border-color:var(--green-dim)}
.day-btn.has-run .day-name{color:var(--green)}
.day-btn.is-rest{opacity:.4}

/* EXERCISE ITEM */
.exercise-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;transition:all .2s}
.exercise-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer}
.exercise-left{display:flex;align-items:center;gap:10px}
.exercise-num{width:24px;height:24px;border-radius:50%;background:var(--cyan-dim);border:1px solid rgba(0,212,255,.3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--cyan);flex-shrink:0}
.exercise-name{font-size:13.5px;font-weight:600;color:var(--white);line-height:1.2}
.exercise-sets{font-size:11px;color:var(--gray);margin-top:1px}
.exercise-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.pr-badge{background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.3);border-radius:20px;padding:3px 8px;font-size:10px;font-weight:700;color:var(--gold)}
.expand-icon{color:var(--gray);font-size:12px;transition:transform .2s}
.exercise-item.expanded .expand-icon{transform:rotate(180deg)}

/* QUICK WEIGHT */
.quick-weight-wrap{display:flex;align-items:center;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .2s;flex-shrink:0}
.quick-weight-wrap:focus-within{border-color:var(--cyan)}
.quick-weight-field{background:transparent;border:none;color:var(--cyan);font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;width:52px;padding:5px 6px;text-align:center;outline:none}
.quick-weight-field::placeholder{color:var(--gray2);font-size:11px;font-weight:400}
.quick-kg{font-size:10px;font-weight:700;color:var(--gray);padding-right:7px}
.quick-save-btn{background:var(--cyan);border:none;color:#000;font-size:11px;font-weight:700;padding:0 8px;height:100%;min-height:30px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s;white-space:nowrap}
.quick-save-btn:active{opacity:.75}
.quick-save-btn.loading{background:var(--gray2);color:var(--gray)}

/* EQUIPMENT */
.equipment-row{display:flex;flex-wrap:wrap;gap:5px;padding:8px 14px 10px;border-bottom:1px solid var(--border);background:rgba(0,0,0,.2)}
.eq-tag{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 9px;font-size:11px;font-weight:500;color:var(--gray);display:flex;align-items:center;gap:4px}
.eq-tag::before{content:'⚙';font-size:9px;opacity:.6}

/* REGISTER FORM */
.register-form{padding:0 14px 14px;display:none;border-top:1px solid var(--border)}
.form-section-label{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--gray);text-transform:uppercase;margin:12px 0 8px}
.max-weight-row{display:flex;align-items:center;gap:10px}
.max-weight-input{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--white);font-size:18px;font-weight:700;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;text-align:center}
.max-weight-input:focus{border-color:var(--cyan)}
.max-weight-input::placeholder{color:var(--gray2);font-size:14px;font-weight:400}
.kg-label{font-size:14px;font-weight:700;color:var(--gray);flex-shrink:0}
.series-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.series-row{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 10px;display:flex;flex-direction:column;gap:4px}
.series-label{font-size:9px;font-weight:700;color:var(--gray);letter-spacing:.5px;text-transform:uppercase}
.series-inputs{display:flex;align-items:center;gap:6px}
.series-input{flex:1;background:transparent;border:none;color:var(--white);font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;outline:none;width:0}
.series-sep{color:var(--gray2);font-size:11px}
.series-unit{font-size:10px;color:var(--gray);flex-shrink:0}
.note-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--white);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;resize:none;transition:border-color .2s}
.note-input:focus{border-color:var(--gray)}
.save-btn{width:100%;margin-top:12px;background:var(--cyan);border:none;border-radius:8px;padding:12px;color:#000;font-size:13px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.save-btn:active{transform:scale(.98);opacity:.85}
.save-btn.loading{background:var(--surface2);color:var(--gray)}

/* RUN CARD */
.run-card{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:10px;margin-bottom:8px;overflow:hidden}
.run-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer}
.run-icon{width:28px;height:28px;border-radius:50%;background:var(--green-dim);border:1px solid rgba(0,230,118,.3);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.run-name{font-size:13.5px;font-weight:600;color:var(--white)}
.run-sub{font-size:11px;color:var(--gray);margin-top:1px}
.run-badge{background:var(--green-dim);border:1px solid rgba(0,230,118,.25);border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700;color:var(--green);white-space:nowrap}
.run-badge.empty{background:var(--surface);border-color:var(--gray2);color:var(--gray2)}
.run-form{padding:0 14px 14px;display:none;border-top:1px solid var(--border)}
.run-card.expanded .expand-icon{transform:rotate(180deg)}

.run-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.run-field{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
.run-field-label{font-size:9px;font-weight:700;color:var(--gray);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.run-field-input{background:transparent;border:none;color:var(--white);font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;outline:none;width:100%}
.run-field-input::placeholder{color:var(--gray2);font-size:12px;font-weight:400}
.run-field-unit{font-size:10px;color:var(--gray);margin-top:2px}
.run-calc{background:var(--green-dim);border:1px solid rgba(0,230,118,.2);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--green);margin-bottom:8px;display:none}

.sprint-fields{margin-bottom:8px}
.sprint-row{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.sprint-input{background:transparent;border:none;color:var(--white);font-size:16px;font-weight:700;font-family:'DM Sans',sans-serif;outline:none;width:60px;text-align:center}
.sprint-sep{font-size:13px;color:var(--gray);font-weight:600}
.sprint-unit{font-size:11px;color:var(--gray)}

.run-save-btn{width:100%;margin-top:4px;background:var(--green);border:none;border-radius:8px;padding:11px;color:#000;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.run-save-btn:active{opacity:.8}
.run-save-btn.loading{background:var(--surface2);color:var(--gray)}

/* FUTEBOL CARD */
.futebol-card{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--purple);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.futebol-icon{font-size:22px}
.futebol-text .futebol-name{font-size:13.5px;font-weight:600;color:var(--white)}
.futebol-text .futebol-sub{font-size:11px;color:var(--gray)}

/* HISTORY */
.search-bar{position:relative;margin-bottom:14px}
.search-input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px 11px 38px;color:var(--white);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--cyan)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--gray);pointer-events:none}
.hist-exercise-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;cursor:pointer;transition:border-color .2s}
.hist-exercise-card:active{border-color:var(--cyan)}
.hist-card-header{padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.hist-ex-name{font-size:14px;font-weight:600;color:var(--white)}
.hist-ex-day{font-size:11px;color:var(--gray);margin-top:1px}
.hist-max{text-align:right}
.hist-max-val{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--cyan)}
.hist-max-val.green{color:var(--green)}
.hist-max-label{font-size:10px;color:var(--gray)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:none;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{width:100%;max-height:88vh;background:var(--surface);border-radius:20px 20px 0 0;border-top:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column;animation:slideUp .3s ease}
.modal-handle{width:36px;height:4px;background:var(--gray2);border-radius:2px;margin:10px auto 6px;flex-shrink:0}
.modal-header{padding:8px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--cyan)}
.modal-close{width:30px;height:30px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--gray);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-body{overflow-y:auto;padding:16px;flex:1}
.chart-wrap{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:14px;position:relative;height:180px}
.hist-entry{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.hist-entry-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.hist-entry-date{font-size:12px;font-weight:600;color:var(--gray)}
.hist-entry-max{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--cyan);letter-spacing:1px}
.hist-entry-max.green{color:var(--green)}
.hist-entry-series{display:flex;flex-wrap:wrap;gap:5px}
.series-chip{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--gray);font-weight:500}
.hist-entry-note{margin-top:6px;font-size:12px;color:var(--gray);font-style:italic}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 12px;text-align:center}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px;line-height:1}
.stat-label{font-size:10px;font-weight:600;color:var(--gray);letter-spacing:.5px;margin-top:4px}
.pr-list-item{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.pr-list-item.run{border-left-color:var(--green)}
.pr-ex{font-size:13px;font-weight:600;color:var(--white)}
.pr-day{font-size:11px;color:var(--gray)}
.pr-weight{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);letter-spacing:1px}
.pr-weight.green{color:var(--green)}

/* EMPTY */
.empty-state{text-align:center;padding:40px 20px;color:var(--gray)}
.empty-icon{font-size:36px;margin-bottom:10px;display:block}
.empty-text{font-size:14px}

/* TOAST */
.toast{position:fixed;bottom:calc(80px + var(--safe-bot) + 10px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:10px 20px;font-size:13px;font-weight:600;color:var(--white);white-space:nowrap;z-index:999;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.pr{border-color:var(--gold);color:var(--gold);background:rgba(255,215,0,.1)}
.toast.error{border-color:var(--red);color:var(--red)}
.toast.run{border-color:var(--green);color:var(--green);background:rgba(0,230,118,.1)}

/* UTILS */
.color-cyan{color:var(--cyan)}
.color-green{color:var(--green)}
.color-orange{color:var(--orange)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="app-title">TREINO TRACKER</div>
    <button class="sync-btn" id="syncBtn" onclick="syncAll()">↻</button>
  </div>
</header>

<!-- REGISTRAR -->
<div class="page active" id="page-register">
  <div class="section-label">Selecione o dia</div>
  <div class="day-selector" id="daySelector"></div>
  <div class="section-label" id="exerciseSectionLabel">Exercícios</div>
  <div id="exerciseList"></div>
</div>

<!-- HISTÓRICO -->
<div class="page" id="page-history">
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" id="searchInput" placeholder="Buscar exercício ou corrida..." oninput="filterHistory()">
  </div>
  <div id="historyList"></div>
</div>

<!-- EVOLUÇÃO -->
<div class="page" id="page-stats">
  <div class="section-label">Resumo geral</div>
  <div class="stats-grid" id="statsGrid"></div>
  <div class="section-label">Recordes por exercício</div>
  <div id="prList"></div>
</div>

<nav class="bottom-nav">
  <div class="nav-item active" onclick="showPage('register',this)">
    <span class="nav-icon">✏️</span><span class="nav-label">REGISTRAR</span>
  </div>
  <div class="nav-item" onclick="showPage('history',this)">
    <span class="nav-icon">📋</span><span class="nav-label">HISTÓRICO</span>
  </div>
  <div class="nav-item" onclick="showPage('stats',this)">
    <span class="nav-icon">📈</span><span class="nav-label">EVOLUÇÃO</span>
  </div>
</nav>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Detalhe</div>
      <button class="modal-close" id="modalCloseBtn">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwONv1scQgVhhwTO70LwrG0EaOgWYt3gcEbbL3kgSllOKOVLYT0gwNr58w8QdPDvBgi/exec';

// ── TREINO DATA ───────────────────────────────────────────────────────────
const TREINO = {
  SEG: {
    label:'LEGS', type:'gym',
    exercises:[
      {name:'Agachamento livre',  sets:'4 × 5–8',   eq:['Barra','Rack','Colchonete']},
      {name:'Leg press 45°',      sets:'3 × 10–15', eq:['Máquina leg press 45°']},
      {name:'Cadeira extensora',  sets:'3 × 12–15', eq:['Máquina cadeira extensora']},
      {name:'Stiff halteres',     sets:'3 × 8–12',  eq:['Halteres','Barra (alternativo)']},
      {name:'Mesa flexora',       sets:'3 × 10–12', eq:['Máquina mesa flexora']},
      {name:'Hip thrust',         sets:'3 × 10–15', eq:['Banco','Barra','Anilhas']},
      {name:'Panturrilha em pé',  sets:'4 × 12–20', eq:['Máquina panturrilha','Degrau (alternativo)']},
    ]
  },
  TER: {
    label:'PULL A', type:'gym+run',
    exercises:[
      {name:'Barra fixa',                sets:'4 × 5–8',   eq:['Barra fixa']},
      {name:'Remada curvada barra',      sets:'3 × 6–10',  eq:['Barra','Anilhas']},
      {name:'Remada máquina unilateral', sets:'3 × 10–12', eq:['Máquina remada unilateral']},
      {name:'Face pull cabo',            sets:'3 × 12–15', eq:['Polia alta','Corda']},
      {name:'Rosca direta',              sets:'3 × 8–12',  eq:['Barra W ou reta']},
      {name:'Rosca martelo',             sets:'2 × 10–12', eq:['Halteres']},
    ],
    run:{type:'z2', label:'Z2 Recuperação', note:'30–45 min · 65–75% FCmax (129–149 bpm)'}
  },
  QUA: {
    label:'PUSH A + ⚽', type:'gym+futebol',

function getTodayKey() {
  const map = ['DOM','SEG','TER','QUA','QUI','SEX','SAB'];
  return map[new Date().getDay()];
}

function getToday() {
  return new Date().toLocaleDateString('pt-BR');
}

function formatDate(d) {
  if (!d) return '';
  try {
    const dt = d instanceof Date ? d : new Date(d);
    if (isNaN(dt)) return String(d);
    return dt.toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit',year:'2-digit'});
  } catch(e) { return String(d); }
}

function calcRun() {
  const distEl = document.getElementById('run-dist');
  const timeEl = document.getElementById('run-time');
  const paceEl = document.getElementById('run-pace');
  const calcEl = document.getElementById('run-calc');
  if (!distEl || !calcEl) return;

  const dist = parseFloat(distEl.value);
  const timeVal = timeEl ? timeEl.value.trim() : '';
  const paceVal = paceEl ? paceEl.value.trim() : '';

  if (!dist || dist <= 0) { calcEl.style.display='none'; return; }

  function timeToSec(str) {
    const p = str.split(':');
    if (p.length === 2) return parseInt(p[0])*60 + parseInt(p[1]);
    return null;
  }
  function secToTime(s) {
    const m = Math.floor(s/60), sec = Math.round(s%60);
    return `${m}:${sec.toString().padStart(2,'0')}`;
  }

  let msg = '';
  if (timeVal && !paceVal) {
    const secs = timeToSec(timeVal);
    if (secs) {
      const paceSec = secs / dist;
      if (paceEl) paceEl.value = secToTime(paceSec);
      msg = `Pace calculado: ${secToTime(paceSec)} min/km`;
    }
  } else if (paceVal && !timeVal) {
    const paceSecs = timeToSec(paceVal);
    if (paceSecs) {
      const totalSec = paceSecs * dist;
      if (timeEl) timeEl.value = secToTime(totalSec);
      msg = `Tempo calculado: ${secToTime(totalSec)}`;
    }
  }

  if (msg) { calcEl.textContent = '⚡ ' + msg; calcEl.style.display='block'; }
  else { calcEl.style.display='none'; }
}

function toggleRun(event) {
  event.stopPropagation();
  const card = document.getElementById('runcard');
  const form = document.getElementById('runform');
  const icon = card.querySelector('.expand-icon');
  const isOpen = form.style.display === 'block';
  form.style.display = isOpen ? 'none' : 'block';
  icon.style.transform = isOpen ? '' : 'rotate(180deg)';
}

function toggleExercise(i, event) {
  const item = document.getElementById('exitem-' + i);
  item.classList.toggle('expanded');
  const eq   = document.getElementById('eq-' + i);
  const form = document.getElementById('form-' + i);
  const isOpen = item.classList.contains('expanded');
  eq.style.display   = isOpen ? 'flex' : 'none';

}

async function quickSave(i) {
  const ex   = TREINO[currentDay].exercises[i];
  const maxW = document.getElementById('qw-' + i).value.trim();
  if (!maxW || parseFloat(maxW) <= 0) { showToast('Digite o peso antes de salvar','error'); return; }
  const btn = document.getElementById('qbtn-' + i);
  btn.textContent = '…'; btn.classList.add('loading'); btn.disabled = true;
  const record = {date:getToday(),day:`${currentDay} — ${TREINO[currentDay].label}`,exercise:ex.name,maxWeight:maxW,s1w:'',s1r:'',s2w:'',s2r:'',s3w:'',s3r:'',s4w:'',s4r:'',note:''};
  try {
    const res = await fetchScript({action:'save',record});
    if (res.status === 'ok') {
      lastAll[ex.name] = {date:record.date,maxWeight:maxW,pr:res.pr?'🏆 PR':''};
      showToast(res.pr ? '🏆 NOVO PR! '+maxW+' kg' : '✓ '+ex.name.split(' ')[0]+' — '+maxW+' kg', res.pr?'pr':'');
      renderDayContent();

  } catch(err) {
    showToast('Erro ao salvar. Tente novamente.','error');
    btn.textContent = '✓'; btn.classList.remove('loading'); btn.disabled = false;
  }
}

// ── SAVE RUN ──────────────────────────────────────────────────────────────
async function saveRun(type) {
  const t = TREINO[currentDay].run;
  const btn = document.getElementById('runsavebtn');
  const note = (document.getElementById('run-note') || {}).value || '';

  let record = {
    date: getToday(),
    day: `${currentDay} — ${t.label}`,
    exercise: t.label,
    runType: type,
    note
  };

  if (type === 'sprint') {
    const n    = document.getElementById('sprint-n').value;
    const dist = document.getElementById('sprint-dist').value;
    if (!n || !dist) { showToast('Informe número de tiros e distância','error'); return; }
    record.maxWeight = dist; // reuse maxWeight as dist/tiro for storage
    record.tiros = `${n}×${dist}m`;
    record.s1w = n; record.s1r = dist;
    record.s2w='';record.s2r='';record.s3w='';record.s3r='';record.s4w='';record.s4r='';
  } else {
    const dist = (document.getElementById('run-dist') || {}).value;
    if (!dist || parseFloat(dist) <= 0) { showToast('Informe a distância','error'); return; }
    const time = (document.getElementById('run-time') || {}).value || '';
    const pace = (document.getElementById('run-pace') || {}).value || '';
    const hr   = (document.getElementById('run-hr')   || {}).value || '';
    record.maxWeight = dist;
    record.s1w = dist; record.s1r = time;
    record.s2w = pace; record.s2r = hr;
    record.s3w='';record.s3r='';record.s4w='';record.s4r='';
  }

  btn.textContent = 'SALVANDO...'; btn.classList.add('loading'); btn.disabled = true;

  try {
    const res = await fetchScript({action:'save', record});
    if (res.status === 'ok') {
      lastRun[t.label] = {dist: record.maxWeight, tiros: record.tiros};
      showToast('✓ Corrida registrada!','run');
      const form = document.getElementById('runform');
      if (form) form.style.display = 'none';
      renderDayContent();
    } else throw new Error(res.msg);
  } catch(err) {
    showToast('Erro ao salvar corrida.','error');
  } finally {
    btn.textContent = 'SALVAR CORRIDA'; btn.classList.remove('loading'); btn.disabled = false;
  }
}

function renderHistoryList(data) {
  const list = document.getElementById('historyList');
  const keys = Object.keys(data);
  if (keys.length === 0) {
    list.innerHTML = '<div class="empty-state"><span class="empty-icon">📋</span><div class="empty-text">Nenhum registro ainda.<br>Faça seu primeiro treino!</div></div>';
    return;
  }

  // Run labels
  const runLabels = new Set(['Z2 Recuperação','Corrida Longa','Sprint']);

  // Group by day
  const byDay = {};
  DAYS.forEach(d => {
    const t = TREINO[d];
    if (t.exercises) {
      t.exercises.forEach(ex => {
        if (data[ex.name]) {
          if (!byDay[d]) byDay[d] = [];
          byDay[d].push({name:ex.name, isRun:false, history:data[ex.name]});
        }
      });
    }
    if (t.run && data[t.run.label]) {
      if (!byDay[d]) byDay[d] = [];
      byDay[d].push({name:t.run.label, isRun:true, history:data[t.run.label]});
    }
  });

  let html = '';
  DAYS.forEach(d => {
    if (!byDay[d] || byDay[d].length === 0) return;
    html += `<div class="section-label">${DAY_NAMES[d]} — ${TREINO[d].label}</div>`;
    byDay[d].forEach(({name, isRun, history}) => {
      const maxEver = Math.max(...history.map(h => parseFloat(h.maxWeight)||0));
      const unit = isRun ? (name==='Sprint' ? 'm/tiro' : 'km') : 'kg';
      const valColor = isRun ? 'green' : '';
      html += `<div class="hist-exercise-card" onclick="openModal('${name.replace(/'/g,"\\'")}', ${isRun})">
        <div class="hist-card-header">
          <div>
            <div class="hist-ex-name">${isRun ? '🏃 ' : ''}${name}</div>
            <div class="hist-ex-day">${history.length} registro${history.length>1?'s':''}</div>
          </div>
          <div class="hist-max">
            <div class="hist-max-val ${valColor}">${maxEver} ${unit}</div>
            <div class="hist-max-label">máx registrado</div>
          </div>
        </div>
      </div>`;
    });
  });

  // Anything not mapped to a day
  const mapped = new Set();
  DAYS.forEach(d => { (byDay[d]||[]).forEach(x => mapped.add(x.name)); });
  const extra = keys.filter(k => !mapped.has(k));
  if (extra.length > 0) {
    html += `<div class="section-label">Outros registros</div>`;
    extra.forEach(name => {
      const history = data[name];
      const maxEver = Math.max(...history.map(h => parseFloat(h.maxWeight)||0));
      html += `<div class="hist-exercise-card" onclick="openModal('${name.replace(/'/g,"\\'")}', false)">
        <div class="hist-card-header">
          <div>
            <div class="hist-ex-name">${name}</div>
            <div class="hist-ex-day">${history.length} registro${history.length>1?'s':''}</div>
          </div>
          <div class="hist-max">
            <div class="hist-max-val">${maxEver}</div>
            <div class="hist-max-label">máx registrado</div>
          </div>
        </div>
      </div>`;
    });
  }

  list.innerHTML = html;
}

function filterHistory() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  if (!q) { renderHistoryList(historyAll); return; }
  const filtered = {};
  Object.keys(historyAll).forEach(k => { if (k.toLowerCase().includes(q)) filtered[k] = historyAll[k]; });
  renderHistoryList(filtered);
}

// ── MODAL ─────────────────────────────────────────────────────────────────
async function openModal(exName, isRun) {
  document.getElementById('modalTitle').textContent = exName;
  document.getElementById('modalBody').innerHTML = '<div class="empty-state"><span class="empty-icon">⏳</span></div>';
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  let history = historyAll[exName];
  if (!history) {
    const res = await fetchScript({action:'getHistory', exercise:exName});
    history = res.status==='ok' ? res.history : [];
  }
  if (history.length === 0) {
    document.getElementById('modalBody').innerHTML = '<div class="empty-state"><span class="empty-icon">📋</span><div class="empty-text">Sem registros ainda.</div></div>';
    return;
  }

  const labels  = history.map(h => formatDate(h.date));
  const weights = history.map(h => parseFloat(h.maxWeight)||0);
  const unit    = isRun ? (exName==='Sprint' ? 'm' : 'km') : 'kg';
  const color   = isRun ? '#00e676' : '#00d4ff';

  let html = `<div class="chart-wrap"><canvas id="exChart"></canvas></div>`;
  html += `<div class="section-label">Registros</div>`;

  [...history].reverse().forEach(h => {
    let chips = [];
    if (isRun && exName === 'Sprint') {
      if (h.s1w && h.s1r) chips.push(`${h.s1w} tiros × ${h.s1r}m`);
    } else if (isRun) {
      if (h.s1w) chips.push(`${h.s1w} km`);
      if (h.s1r) chips.push(`⏱ ${h.s1r}`);
      if (h.s2w) chips.push(`👟 ${h.s2w}/km`);
      if (h.s2r) chips.push(`❤️ ${h.s2r} bpm`);
    } else {
      [1,2,3,4].forEach(s => {
        const w = h['s'+s+'w'], r = h['s'+s+'r'];
        if (w && r) chips.push(`${w}kg × ${r}`);
      });
    }
    html += `<div class="hist-entry">
      <div class="hist-entry-top">
        <div class="hist-entry-date">${formatDate(h.date)} ${h.pr?'<span style="color:var(--gold)">🏆 PR</span>':''}</div>
        <div class="hist-entry-max ${isRun?'green':''}">${h.maxWeight} ${unit}</div>
      </div>
      ${chips.length>0 ? `<div class="hist-entry-series">${chips.map(c=>`<span class="series-chip">${c}</span>`).join('')}</div>` : ''}
      ${h.note ? `<div class="hist-entry-note">"${h.note}"</div>` : ''}
    </div>`;
  });

  document.getElementById('modalBody').innerHTML = html;

  if (activeChart) activeChart.destroy();
  const ctx = document.getElementById('exChart').getContext('2d');
  activeChart = new Chart(ctx, {
    type:'line',
    data:{
      labels,
      datasets:[{
        data:weights, borderColor:color,
        backgroundColor: isRun ? 'rgba(0,230,118,0.08)' : 'rgba(0,212,255,0.08)',
        borderWidth:2,
        pointBackgroundColor:weights.map(w => w===Math.max(...weights)?'#ffd700':color),
        pointRadius:4, pointHoverRadius:6, fill:true, tension:0.3
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{
        backgroundColor:'#1a1e2a',borderColor:'#252b3b',borderWidth:1,
        titleColor:'#8892a4',bodyColor:'#f0f4ff',
        callbacks:{label:ctx=>ctx.raw+' '+unit}
      }},
      scales:{
        x:{grid:{color:'#252b3b'},ticks:{color:'#8892a4',font:{size:10}}},
        y:{grid:{color:'#252b3b'},ticks:{color:'#8892a4',font:{size:10},callback:v=>v+' '+unit}}
      }
    }
  });
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  if (activeChart) { activeChart.destroy(); activeChart = null; }
}

// ── STATS ─────────────────────────────────────────────────────────────────
async function renderStats() {
  document.getElementById('statsGrid').innerHTML = '';
  document.getElementById('prList').innerHTML = '<div class="empty-state"><span class="empty-icon">⏳</span></div>';
  if (Object.keys(historyAll).length === 0) await renderHistory();

  const allRecords = Object.values(historyAll).flat();
  const totalSessions  = new Set(allRecords.map(r=>`${r.date}-${r.day}`)).size;
  const totalRegisters = allRecords.length;
  const totalPRs       = allRecords.filter(r=>r.pr&&r.pr.includes('PR')).length;
  const totalKm        = Object.entries(historyAll)
    .filter(([k]) => k==='Z2 Recuperação'||k==='Corrida Longa')
    .flatMap(([,v])=>v)
    .reduce((acc,r)=>acc+(parseFloat(r.maxWeight)||0),0);

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-val color-cyan">${totalSessions}</div><div class="stat-label">TREINOS REALIZADOS</div></div>
    <div class="stat-card"><div class="stat-val color-green">${totalRegisters}</div><div class="stat-label">EXERCÍCIOS REGISTRADOS</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--gold)">${totalPRs}</div><div class="stat-label">PRs CONQUISTADOS</div></div>
    <div class="stat-card"><div class="stat-val color-green">${totalKm.toFixed(1)}</div><div class="stat-label">KM PERCORRIDOS</div></div>`;

  const prItems = [];
  DAYS.forEach(d => {
    const t = TREINO[d];
    if (t.exercises) {
      t.exercises.forEach(ex => {
        const h = historyAll[ex.name];
        if (!h) return;
        const maxW = Math.max(...h.map(r=>parseFloat(r.maxWeight)||0));
        if (maxW > 0) prItems.push({name:ex.name, day:`${DAY_NAMES[d]} — ${t.label}`, maxW, isRun:false});
      });
    }
    if (t.run && historyAll[t.run.label]) {
      const h = historyAll[t.run.label];
      const maxW = Math.max(...h.map(r=>parseFloat(r.maxWeight)||0));
      if (maxW > 0) prItems.push({name:t.run.label, day:`${DAY_NAMES[d]} — ${t.label}`, maxW, isRun:true});
    }
  });

  prItems.sort((a,b) => b.maxW - a.maxW);

  if (prItems.length === 0) {
    document.getElementById('prList').innerHTML = '<div class="empty-state"><span class="empty-icon">🏆</span><div class="empty-text">Registre treinos para ver seus recordes.</div></div>';
    return;
  }

  document.getElementById('prList').innerHTML = prItems.map(p => {
    const unit = p.isRun ? (p.name==='Sprint'?'m':'km') : 'kg';
    return `<div class="pr-list-item ${p.isRun?'run':''}" onclick="openModal('${p.name.replace(/'/g,"\\'")}', ${p.isRun})">
      <div><div class="pr-ex">${p.isRun?'🏃 ':''}${p.name}</div><div class="pr-day">${p.day}</div></div>
      <div class="pr-weight ${p.isRun?'green':''}">${p.maxW} ${unit}</div>
    </div>`;
  }).join('');
}

// ── SYNC ──────────────────────────────────────────────────────────────────
async function syncAll() {
  const btn = document.getElementById('syncBtn');
  btn.classList.add('syncing');
  try {
    const res = await fetchScript({action:'getLastAll'});
    if (res.status === 'ok') {
      const all = res.last || {};
      // separate run from gym
      const runLabels = new Set(['Z2 Recuperação','Corrida Longa','Sprint']);
      lastAll = {};
      lastRun = {};
      Object.entries(all).forEach(([k,v]) => {
        if (runLabels.has(k)) lastRun[k] = {dist:v.maxWeight, tiros:v.pr};
        else lastAll[k] = v;
      });
      renderDayContent();
    }
  } catch(err) {
    showToast('Sem conexão','error');
  } finally {
    btn.classList.remove('syncing');
  }
}

// ── FETCH (JSONP) ─────────────────────────────────────────────────────────
function fetchScript(payload) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now();
    const encoded = encodeURIComponent(JSON.stringify(payload));
    const url = SCRIPT_URL + '?payload=' + encoded + '&callback=' + cbName;
    const script = document.createElement('script');
    const timer = setTimeout(() => {
      delete window[cbName];
      if (document.body.contains(script)) document.body.removeChild(script);
      reject(new Error('timeout'));
    }, 20000);
    window[cbName] = (data) => {
      clearTimeout(timer);
      delete window[cbName];
      if (document.body.contains(script)) document.body.removeChild(script);
      resolve(data);
    };
    script.src = url;
    script.onerror = () => {
      clearTimeout(timer);
      delete window[cbName];
      if (document.body.contains(script)) document.body.removeChild(script);
      reject(new Error('script error'));
    };
    document.body.appendChild(script);
  });
}

// ── TOAST ─────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type?' '+type:'');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}
